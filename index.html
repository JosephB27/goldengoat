    /* ============================================================
       VISUAL TOKENS — tuned to the Square reference photo
       ============================================================ */
    :root {
      --bg:         #373737;  /* screen background                    */
      --blue:       #1c9dd7;  /* preset tip buttons                   */
      --blue-press: #1684b6;  /* preset pressed state                 */
      --blue-alt:   #2ea3d1;  /* Custom Tip / No Tip row (just a hair lighter) */
      --accent:     #2bc0ff;  /* Cancel link                          */
      --text:       #dedede;  /* title, button labels                 */
      --muted:      #9a9a9f;  /* subtotal, language label             */
      --green:      #2fbf5f;  /* confirmation checkmark               */

      /* ---- layout tokens (cloned from the reference photo) ---- */
      --gap:    16px;    /* the thin dark gap between all boxes — the key value */
      --pad-x:  3.6vw;   /* side padding from screen edge to the button band    */
      --radius: 2px;     /* button corner rounding (nearly square, like the photo) */

      /* Square's brand typeface, with system fallbacks */
      --font-display: 'Square Sans Display', -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      --font-text:    'Square Sans Text', -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      font-family: var(--font-text);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      /* kiosk hardening: no selection, no callout, no tap highlight */
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    #app {
      position: fixed;
      inset: 0;
      /* respect the device safe area but keep the dark field edge-to-edge */
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(20px, 4vh, 56px) clamp(20px, 4vw, 64px);
    }
    .hidden { display: none !important; }

    /* ============================================================
       TIP SCREEN  — cloned 1:1 from the Square reference photo
       Layout: top bar (title + Cancel) · one 3-col button grid ·
       bottom-right language footer. Optimized to fill the iPad
       (A16) landscape viewport, 1180 x 820 CSS px.
       ============================================================ */
    #tipScreen {
      align-items: stretch;          /* full-width children inside the padding */
      justify-content: flex-start;
      /* extra top padding drops the title lower; bottom reserves footer room */
      padding: clamp(48px, 8vh, 92px) var(--pad-x) clamp(52px, 8vh, 78px);
      gap: clamp(14px, 2.6vh, 28px);
    }

    /* --- top bar: title on the left, "Cancel" on the right --- */
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    .titleblock h1 {
      font-family: var(--font-display);
      font-size: clamp(36px, 6.5vh, 60px);
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.05;
    }
    .titleblock .subtotal {
      margin-top: clamp(4px, 0.9vh, 10px);
      color: var(--muted);
      font-size: clamp(15px, 2.4vh, 24px);
      font-weight: 400;
    }
    .cancel {
      background: none;
      border: none;
      color: var(--accent);
      font-size: clamp(22px, 3.6vh, 36px);
      font-weight: 400;
      line-height: 1.05;
      cursor: pointer;
      padding: 0;
    }
    .cancel.pressed { opacity: 0.55; }

    /* --- button block: presets row over a 50/50 secondary row,
           uniform --gap between every box --- */
    .grid {
      flex: 0 0 auto;
      height: clamp(280px, 49vh, 412px);
      /* center the button block vertically in the space below the title,
         so the empty space is balanced above and below */
      margin-block: auto;
      display: flex;
      flex-direction: column;
      gap: var(--gap);
      min-height: 0;
    }
    .presets {
      flex: 1.6 1 0;        /* presets ~1.6x taller than the row below */
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);
      min-height: 0;
    }
    .secondary {
      flex: 1 1 0;
      display: grid;
      grid-template-columns: 1fr 1fr;   /* Custom Tip / No Tip as equal halves */
      gap: var(--gap);
      min-height: 0;
    }

    .preset,
    .alt {
      border: none;
      border-radius: var(--radius);
      color: var(--bg);             /* label matches the screen background */
      cursor: pointer;
      overflow: hidden;
      position: relative;
      display: flex;                 /* center the label both axes */
      align-items: center;
      justify-content: center;
      text-align: center;
      /* solid square filled with the text color */
      background-color: var(--text);
      transition: transform 90ms ease, background-color 90ms ease, filter 90ms ease;
    }
    .preset {
      font-family: var(--font-display);
      font-size: clamp(30px, 6.4vh, 64px);
      font-weight: 700;                 /* bold numbers */
      letter-spacing: -0.005em;
      font-variant-numeric: tabular-nums;
    }
    .alt {
      font-size: clamp(18px, 3vh, 30px);
      font-weight: 400;
    }
    /* shared press feedback: dip down slightly + darken on touch */
    .preset.pressed,
    .alt.pressed,
    .key.pressed,
    .kp-action.pressed {
      transform: scale(0.985);
      filter: brightness(0.86);
    }
    .preset.pressed,
    .alt.pressed { background-color: #c6c6c6; }   /* darken the light square on touch */

    /* --- language footer, bottom-right --- */
    .footer {
      position: absolute;
      right: var(--pad-x);
      bottom: clamp(14px, 2.4vh, 26px);
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: clamp(13px, 1.9vh, 19px);
    }
    .footer svg { width: 1.05em; height: 1.05em; opacity: 0.9; }

    /* ============================================================
       CUSTOM KEYPAD
       ============================================================ */
    #keypadScreen { justify-content: center; }
    .amount-display {
      font-family: var(--font-display);
      font-size: clamp(48px, 11vh, 110px);
      font-weight: 700;                 /* bold numbers */
      letter-spacing: -0.02em;
      margin-bottom: clamp(16px, 3vh, 36px);
      min-height: 1.1em;
      font-variant-numeric: tabular-nums;
    }
    .keys {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(10px, 1.6vw, 20px);
      width: 100%;
      max-width: 520px;
      margin-bottom: clamp(16px, 3vh, 32px);
    }
    .key {
      min-height: clamp(58px, 11vh, 96px);
      border: none;
      border-radius: 12px;
      background: #4a4a4a;
      color: var(--text);
      font-family: var(--font-display);
      font-size: clamp(26px, 4.5vh, 44px);
      font-weight: 700;                 /* bold numbers */
      cursor: pointer;
      transition: transform 90ms ease, filter 90ms ease;
      font-variant-numeric: tabular-nums;
    }
    .key svg { width: 0.9em; height: 0.9em; }

    .keypad-actions {
      display: flex;
      gap: clamp(10px, 1.6vw, 20px);
      width: 100%;
      max-width: 520px;
    }
    .kp-action {
      flex: 1;
      min-height: clamp(54px, 9vh, 80px);
      border: none;
      border-radius: 12px;
      font-size: clamp(18px, 2.6vh, 26px);
      font-weight: 500;
      cursor: pointer;
      color: var(--text);
      transition: transform 90ms ease, filter 90ms ease;
    }
    #kpBack { background: #4a4a4a; }
    #kpAdd  { background: var(--blue); }
    #kpAdd.disabled { opacity: 0.4; pointer-events: none; }

    /* ============================================================
       CONFIRMATION OVERLAY
       ============================================================ */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(18px, 3vh, 36px);
    }

    /* processing spinner */
    .spinner {
      width: clamp(56px, 9vh, 90px);
      height: clamp(56px, 9vh, 90px);
      border: 5px solid rgba(255, 255, 255, 0.16);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* success cluster */
    .success { display: flex; flex-direction: column; align-items: center; gap: clamp(14px, 2.6vh, 30px); }
    .check-circle {
      width: clamp(96px, 18vh, 180px);
      height: clamp(96px, 18vh, 180px);
    }
    .check-circle circle {
      fill: none;
      stroke: var(--green);
      stroke-width: 5;
      stroke-dasharray: 295;
      stroke-dashoffset: 295;
      animation: draw-circle 0.5s ease forwards;
    }
    .check-circle path {
      fill: none;
      stroke: var(--green);
      stroke-width: 7;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 80;
      stroke-dashoffset: 80;
      animation: draw-check 0.35s 0.42s ease forwards;
    }
    @keyframes draw-circle { to { stroke-dashoffset: 0; } }
    @keyframes draw-check  { to { stroke-dashoffset: 0; } }

    .thanks {
      font-family: var(--font-display);
      font-size: clamp(30px, 5.5vh, 60px);
      font-weight: 700;
      opacity: 0;
      animation: fade-up 0.4s 0.5s ease forwards;
    }
    .confirm-amount {
      color: var(--muted);
      font-size: clamp(18px, 2.6vh, 28px);
      opacity: 0;
      animation: fade-up 0.4s 0.62s ease forwards;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       HIDDEN BARISTA RESET CORNER (top-left, invisible)
       ============================================================ */
    #resetCorner {
      position: absolute;
      top: 0;
      left: 0;
      width: 90px;
      height: 90px;
      z-index: 50;
      /* invisible to customers; sits in dead space away from buttons */
      background: transparent;
    }
  </style>
</head>

<body>
  <div id="app">
    <!-- Hidden long-press reset zone (top-left, 90x90) -->
    <div id="resetCorner"></div>

    <!-- ===== TIP SCREEN (default) =====
         EDIT HERE to reskin for the discount variant:
         change the <h1>, the .preset labels + their data-amount,
         and the .alt labels. Logic stays untouched. -->
    <section id="tipScreen" class="screen">
      <!-- top bar: title + subtotal (left), Cancel (right) -->
      <div class="topbar">
        <div class="titleblock">
          <h1>How much would you like to save?</h1>
        </div>
        <button class="cancel" id="cancelBtn">Cancel</button>
      </div>

      <!-- button block: 3 presets on top, Custom Tip + No Tip (50/50) below -->
      <div class="grid">
        <div class="presets">
          <button class="preset" data-amount="60">60%</button>
          <button class="preset" data-amount="75">75%</button>
          <button class="preset" data-amount="100">100%</button>
        </div>
        <div class="secondary">
          <button class="alt" id="customBtn">Custom Discount</button>
          <button class="alt" id="noTipBtn">No Discount</button>
        </div>
      </div>

      <!-- language footer, bottom-right -->
      <div class="footer">
        <!-- globe icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M3 12h18M12 3c2.5 2.7 2.5 15.3 0 18M12 3c-2.5 2.7-2.5 15.3 0 18"></path>
        </svg>
        <span>English</span>
      </div>
    </section>

    <!-- ===== CUSTOM KEYPAD ===== -->
    <section id="keypadScreen" class="screen hidden">
      <div class="amount-display" id="amountDisplay">0%</div>
      <div class="keys">
        <button class="key" data-digit="1">1</button>
        <button class="key" data-digit="2">2</button>
        <button class="key" data-digit="3">3</button>
        <button class="key" data-digit="4">4</button>
        <button class="key" data-digit="5">5</button>
        <button class="key" data-digit="6">6</button>
        <button class="key" data-digit="7">7</button>
        <button class="key" data-digit="8">8</button>
        <button class="key" data-digit="9">9</button>
        <button class="key" data-digit="0" style="grid-column: 2;">0</button>
        <button class="key" id="kpBackspace" aria-label="Backspace">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M21 5H8.5L3 12l5.5 7H21z"></path>
            <path d="M11 9.5l5 5M16 9.5l-5 5"></path>
          </svg>
        </button>
      </div>
      <div class="keypad-actions">
        <button class="kp-action" id="kpBack">Back</button>
        <button class="kp-action disabled" id="kpAdd">Add Discount</button>
      </div>
    </section>

    <!-- ===== CONFIRMATION OVERLAY ===== -->
    <div id="confirmOverlay" class="overlay hidden">
      <div class="spinner" id="spinner"></div>
      <div class="success hidden" id="success">
        <svg class="check-circle" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="47"></circle>
          <path d="M28 51 L44 67 L73 36"></path>
        </svg>
        <div class="thanks" id="thanksText">Thank you!</div>
        <div class="confirm-amount" id="confirmAmount"></div>
      </div>
    </div>
  </div>

  <script>
    /* ============================================================
       CONFIG — everything tunable lives here
       ============================================================ */
    const CONFIG = {
      subtotal:     "2.70",     // amount shown under the title
      thankYouMsg:  "Thank you!", // confirmation headline
      processingMs: 1100,       // processing spinner duration
      showCheckMs:  2200,       // how long the checkmark holds before auto-reset
      longPressMs:  1200,       // hold time on the corner to reset
      idleResetMs:  60000       // inactivity reset (set 0 to disable)
    };

    /* ---------- element refs ---------- */
    const tipScreen    = document.getElementById('tipScreen');
    const keypadScreen = document.getElementById('keypadScreen');
    const overlay      = document.getElementById('confirmOverlay');
    const spinner      = document.getElementById('spinner');
    const success      = document.getElementById('success');
    const thanksText   = document.getElementById('thanksText');
    const confirmAmount= document.getElementById('confirmAmount');
    const amountDisplay= document.getElementById('amountDisplay');
    const kpAdd        = document.getElementById('kpAdd');

    /* ---------- apply config to the DOM ---------- */
    thanksText.textContent = CONFIG.thankYouMsg;

    /* ---------- state ---------- */
    let cents = 0;                 // keypad accumulator (terminal-style entry)
    let confirmTimers = [];        // in-flight confirmation timeouts
    let idleTimer = null;

    /* ============================================================
       SCREEN HELPERS
       ============================================================ */
    function showOnly(el) {
      tipScreen.classList.add('hidden');
      keypadScreen.classList.add('hidden');
      el.classList.remove('hidden');
    }

    function clearConfirmTimers() {
      confirmTimers.forEach(clearTimeout);
      confirmTimers = [];
    }

    /* Hard reset to the clean start screen from ANY state. */
    function reset() {
      clearConfirmTimers();
      overlay.classList.add('hidden');
      spinner.classList.remove('hidden');
      success.classList.add('hidden');
      resetKeypad();
      showOnly(tipScreen);
      bumpIdle();
    }

    /* ============================================================
       CONFIRMATION FLOW
       processing spinner -> green check + thanks -> auto-reset
       amount: a display string like "$1.00", or null for No Tip
       ============================================================ */
    function confirm(amount) {
      clearConfirmTimers();
      // prep overlay: spinner visible, success hidden, re-arm animations
      spinner.classList.remove('hidden');
      success.classList.add('hidden');
      confirmAmount.textContent = amount ? amount + ' discount applied' : '';
      overlay.classList.remove('hidden');

      // 1) processing -> reveal success
      confirmTimers.push(setTimeout(() => {
        spinner.classList.add('hidden');
        // force a reflow so the SVG draw animations replay each time
        success.classList.remove('hidden');
        void success.offsetWidth;
        // 2) hold the checkmark, then auto-return
        confirmTimers.push(setTimeout(reset, CONFIG.showCheckMs));
      }, CONFIG.processingMs));
    }

    /* ============================================================
       KEYPAD
       ============================================================ */
    function resetKeypad() {
      cents = 0;
      renderAmount();
    }
    function renderAmount() {
      amountDisplay.textContent = cents + '%';
      kpAdd.classList.toggle('disabled', cents === 0);
    }
    function pushDigit(d) {
      // terminal-style: digits shift in from the right
      const next = cents * 10 + d;
      if (next > 100) return;     // cap at 100%
      cents = next;
      renderAmount();
    }
    function backspace() {
      cents = Math.floor(cents / 10);
      renderAmount();
    }

    /* ============================================================
       PRESS FEEDBACK — add .pressed on pointer down, strip on up
       (visual dip + darken without relying on :active quirks)
       ============================================================ */
    function wirePress(el) {
      const on  = () => el.classList.add('pressed');
      const off = () => el.classList.remove('pressed');
      el.addEventListener('pointerdown', on);
      el.addEventListener('pointerup', off);
      el.addEventListener('pointerleave', off);
      el.addEventListener('pointercancel', off);
    }
    document.querySelectorAll('.preset, .alt, .key, .kp-action, .cancel').forEach(wirePress);

    /* ============================================================
       EVENT WIRING
       ============================================================ */
    // preset tips
    document.querySelectorAll('.preset').forEach(btn => {
      btn.addEventListener('click', () => {
        confirm(btn.dataset.amount + '%');
      });
    });

    // No Tip — same flow, no amount line
    document.getElementById('noTipBtn').addEventListener('click', () => confirm(null));

    // Custom Tip -> keypad
    document.getElementById('customBtn').addEventListener('click', () => {
      resetKeypad();
      showOnly(keypadScreen);
    });

    // Cancel -> start
    document.getElementById('cancelBtn').addEventListener('click', reset);

    // keypad digits + backspace
    document.querySelectorAll('.key[data-digit]').forEach(k => {
      k.addEventListener('click', () => pushDigit(Number(k.dataset.digit)));
    });
    document.getElementById('kpBackspace').addEventListener('click', backspace);
    document.getElementById('kpBack').addEventListener('click', () => { resetKeypad(); showOnly(tipScreen); });
    kpAdd.addEventListener('click', () => {
      if (cents === 0) return;
      confirm(cents + '%');
    });

    /* ============================================================
       HIDDEN BARISTA RESET — long-press top-left corner
       ============================================================ */
    (function () {
      const corner = document.getElementById('resetCorner');
      let pressTimer = null;
      const start = (e) => {
        e.preventDefault();
        clearTimeout(pressTimer);
        pressTimer = setTimeout(reset, CONFIG.longPressMs);
      };
      const cancel = () => clearTimeout(pressTimer);
      corner.addEventListener('pointerdown', start);
      corner.addEventListener('pointerup', cancel);
      corner.addEventListener('pointerleave', cancel);
      corner.addEventListener('pointercancel', cancel);
    })();

    /* ============================================================
       IDLE AUTO-RESET — backstop for an abandoned flow
       ============================================================ */
    function bumpIdle() {
      if (!CONFIG.idleResetMs) return;
      clearTimeout(idleTimer);
      idleTimer = setTimeout(reset, CONFIG.idleResetMs);
    }
    ['pointerdown', 'touchstart', 'keydown'].forEach(evt =>
      document.addEventListener(evt, bumpIdle, { passive: true })
    );

    /* ============================================================
       KIOSK HARDENING — kill gestures that could break the illusion
       ============================================================ */
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('gesturestart', e => e.preventDefault());
    document.addEventListener('dblclick', e => e.preventDefault());

    /* ---------- boot ---------- */
    reset();
  </script>
</body>
</html>
